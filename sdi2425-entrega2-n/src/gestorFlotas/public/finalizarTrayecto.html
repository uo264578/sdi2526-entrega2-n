<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Finalizar Trayecto</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
</head>
<body class="p-4 bg-light">

<h2 class="text-primary mb-4">Finalizar Trayecto</h2>

<div id="mensaje"></div>

<form id="form-finalizar-trayecto">
  <div class="mb-3">
    <label for="odometroFin" class="form-label">Odómetro Final</label>
    <input type="number" id="odometroFin" class="form-control" required>
  </div>

  <div class="mb-3">
    <label for="observaciones" class="form-label">Observaciones (opcional)</label>
    <textarea id="observaciones" class="form-control"></textarea>
  </div>

  <button type="submit" class="btn btn-danger">Finalizar Trayecto</button>
</form>

<script>
  $(document).ready(function() {
    const token = localStorage.getItem('token');
    if (!token) {
      alert("Debes iniciar sesión.");
      window.location.href = "loginAjax.html";
      return;
    }

    let idTrayectoActual = null;

    $.ajax({
      url: "/api/trayectos/mis-trayectos",
      method: "GET",
      headers: {
        'Authorization': 'Bearer ' + token
      },
      success: function(trayectos) {
        const enCurso = trayectos.find(t => !t.fechaFin);
        if (!enCurso) {
          $("#mensaje").html('<div class="alert alert-info">No tienes trayectos en curso.</div>');
          $('#form-finalizar-trayecto').hide();
        } else {
          idTrayectoActual = enCurso._id;
        }
      },
      error: function() {
        $("#mensaje").html('<div class="alert alert-danger">Error al obtener el trayecto en curso.</div>');
      }
    });

    $('#form-finalizar-trayecto').submit(function(e) {
      e.preventDefault();

      if (!idTrayectoActual) {
        $("#mensaje").html('<div class="alert alert-danger">No se puede finalizar porque no hay trayecto en curso.</div>');
        return;
      }

      const odometroFin = $('#odometroFin').val();
      const observaciones = $('#observaciones').val();

      $.ajax({
        url: "/api/trayectos/finalizar",
        method: "POST",
        headers: {
          'Authorization': 'Bearer ' + token,
          'Content-Type': 'application/json'
        },
        data: JSON.stringify({
          idTrayecto: idTrayectoActual,
          odometroFin: Number(odometroFin),
          observaciones: observaciones
        }),
        success: function(response) {
          $("#mensaje").html('<div class="alert alert-success">' + response.message + '</div>');
          $('#form-finalizar-trayecto')[0].reset();
        },
        error: function(xhr) {
          const msg = xhr.responseJSON?.error || "Error al finalizar el trayecto.";
          $("#mensaje").html('<div class="alert alert-danger">' + msg + '</div>');
        }
      });
    });
  });
</script>

</body>
</html>
