<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Iniciar Trayecto</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
</head>
<body class="p-4 bg-light">

<h2 class="text-primary mb-4">Iniciar Nuevo Trayecto</h2>

<div id="mensaje"></div>

<form id="formulario-iniciar-trayecto">
  <div class="mb-3">
    <label for="matricula" class="form-label">Selecciona un Vehículo Disponible</label>
    <select id="matricula" class="form-select" required>
      <option value="">-- Elige una matrícula --</option>
    </select>
  </div>

  <button type="submit" class="btn btn-success">Iniciar Trayecto</button>
</form>

<script>
  $(document).ready(function() {
    const token = localStorage.getItem('token');
    if (!token) {
      alert('Debes iniciar sesión.');
      window.location.href = 'loginAjax.html'; // O como se llame tu login
      return;
    }

    $.ajax({
      url: "/api/vehiculos/disponibles",
      method: "GET",
      headers: {
        'Authorization': 'Bearer ' + token
      },
      success: function(vehiculos) {
        vehiculos.forEach(v => {
          $('#matricula').append(`<option value="${v.matricula}">${v.matricula} - ${v.marca} ${v.modelo}</option>`);
        });
      },
      error: function(xhr) {
        $("#mensaje").html('<div class="alert alert-danger">Error cargando vehículos: ' + (xhr.responseJSON?.error || "Error desconocido") + '</div>');
      }
    });

    $('#formulario-iniciar-trayecto').submit(function(event) {
      event.preventDefault();
      const matricula = $('#matricula').val();

      if (!matricula) {
        $("#mensaje").html('<div class="alert alert-danger">Debes seleccionar un vehículo.</div>');
        return;
      }

      $.ajax({
        url: "/api/trayectos/iniciar",
        method: "POST",
        headers: {
          'Authorization': 'Bearer ' + token,
          'Content-Type': 'application/json'
        },
        data: JSON.stringify({ matricula }),
        success: function(response) {
          $("#mensaje").html('<div class="alert alert-success">Trayecto iniciado correctamente.</div>');
          $('#formulario-iniciar-trayecto')[0].reset();
        },
        error: function(xhr) {
          const errorMsg = xhr.responseJSON?.error || "Error al iniciar trayecto.";
          $("#mensaje").html('<div class="alert alert-danger">' + errorMsg + '</div>');
        }
      });
    });
  });
</script>

</body>
<div class="mb-4">
  <a href="menuEmpleado.html" class="btn btn-secondary">Volver al Menú</a>
</div>
</html>
