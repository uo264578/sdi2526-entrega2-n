<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Historial de Trayectos</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
</head>
<body class="p-4 bg-light">

<h2 class="text-primary mb-4">Historial de un Vehículo</h2>

<div id="mensaje"></div>

<form id="formulario-historial">
  <div class="mb-3">
    <label for="matricula" class="form-label">Matrícula del Vehículo</label>
    <input type="text" id="matricula" class="form-control" placeholder="Ej: 1234ABC" required>
  </div>

  <button type="submit" class="btn btn-primary">Buscar Trayectos</button>
</form>

<table class="table table-striped mt-4" id="tabla-trayectos" style="display:none;">
  <thead>
  <tr>
    <th>Fecha Inicio</th>
    <th>Fecha Fin</th>
    <th>Odómetro Inicio</th>
    <th>Odómetro Fin</th>
    <th>Conductor</th>
  </tr>
  </thead>
  <tbody></tbody>
</table>

<script>
  $(document).ready(function() {
    const token = localStorage.getItem('token');
    if (!token) {
      alert('Debes iniciar sesión.');
      window.location.href = 'client.html';
      return;
    }

    $('#formulario-historial').submit(function(event) {
      event.preventDefault();
      const matricula = $('#matricula').val().trim();

      $.ajax({
        url: "/api/trayectos/vehiculo/" + matricula,
        method: "GET",
        headers: {
          'Authorization': 'Bearer ' + token
        },
        success: function(trayectos) {
          $("#mensaje").html('');
          if (trayectos.length === 0) {
            $("#mensaje").html('<div class="alert alert-warning">No hay trayectos registrados para este vehículo.</div>');
            $('#tabla-trayectos').hide();
          } else {
            $('#tabla-trayectos tbody').empty();
            trayectos.forEach(t => {
              $('#tabla-trayectos tbody').append(`
                                <tr>
                                    <td>${new Date(t.fechaInicio).toLocaleString()}</td>
                                    <td>${t.fechaFin ? new Date(t.fechaFin).toLocaleString() : "En curso"}</td>
                                    <td>${t.odometroInicio ?? '-'}</td>
                                    <td>${t.odometroFin ?? '-'}</td>
                                    <td>${t.dniEmpleado}</td>
                                </tr>
                            `);
            });
            $('#tabla-trayectos').show();
          }
        },
        error: function(xhr) {
          const errorMsg = xhr.responseJSON?.error || "Error cargando trayectos.";
          $("#mensaje").html('<div class="alert alert-danger">' + errorMsg + '</div>');
        }
      });
    });
  });
</script>

</body>
<div class="mb-4">
  <a href="menuEmpleado.html" class="btn btn-secondary">Volver al Menú</a>
</div>

</html>
