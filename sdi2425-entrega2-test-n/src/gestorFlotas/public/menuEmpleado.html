<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Portal de Empleado</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
</head>
<body class="p-4 bg-light">

<div class="d-flex justify-content-between align-items-center mb-4">
    <h2 class="text-primary">Portal de Empleado</h2>
    <button id="btn-logout" class="btn btn-danger">Cerrar Sesión</button>
</div>

<div class="list-group">
    <a href="vehiculosDisponibles.html" class="list-group-item list-group-item-action">
        Ver Vehículos Disponibles
    </a>
    <a href="iniciarTrayecto.html" class="list-group-item list-group-item-action">
        Iniciar Nuevo Trayecto
    </a>
    <a href="historialVehiculo.html" class="list-group-item list-group-item-action">
        Consultar Historial de Vehículo
    </a>
    <a href="misTrayectos.html" class="list-group-item list-group-item-action">
        Ver Mis Trayectos
    </a>
</div>

<script>
    $(document).ready(function() {
        const token = localStorage.getItem('token');
        if (!token) {
            alert('Debes iniciar sesión.');
            window.location.href = 'loginAjax.html';
            return;
        }

        $('#btn-logout').click(function() {
            localStorage.removeItem('token');
            window.location.href = 'loginAjax.html';
        });
    });
</script>

</body>
</html>
