<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Mis Trayectos</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
</head>
<body class="p-4 bg-light">

<div class="d-flex justify-content-between align-items-center mb-4">
  <h2 class="text-primary">Mis Trayectos</h2>
  <a href="menuEmpleado.html" class="btn btn-secondary">🏠 Volver al Menú</a>
</div>

<div id="mensaje"></div>

<table class="table table-striped mt-4" id="tabla-trayectos" style="display:none;">
  <thead>
  <tr>
    <th>Matrícula</th>
    <th>Fecha Inicio</th>
    <th>Fecha Fin</th>
    <th>Km Inicio</th>
    <th>Km Fin</th>
  </tr>
  </thead>
  <tbody></tbody>
</table>

<script>
  $(document).ready(function() {
    const token = localStorage.getItem('token');
    if (!token) {
      alert('Debes iniciar sesión.');
      window.location.href = 'loginAjax.html';
      return;
    }

    $.ajax({
      url: "/api/trayectos/mis-trayectos",
      method: "GET",
      headers: {
        'Authorization': 'Bearer ' + token
      },
      success: function(trayectos) {
        if (trayectos.length === 0) {
          $("#mensaje").html('<div class="alert alert-warning">No has realizado trayectos aún.</div>');
          $('#tabla-trayectos').hide();
        } else {
          $('#tabla-trayectos tbody').empty();
          trayectos.forEach(t => {
            $('#tabla-trayectos tbody').append(`
                        <tr>
                            <td>${t.matriculaVehiculo}</td>
                            <td>${new Date(t.fechaInicio).toLocaleString()}</td>
                            <td>${t.fechaFin ? new Date(t.fechaFin).toLocaleString() : "En curso"}</td>
                            <td>${t.odometroInicio ?? '-'}</td>
                            <td>${t.odometroFin ?? '-'}</td>
                        </tr>
                    `);
          });
          $("#mensaje").html('');
          $('#tabla-trayectos').show();
        }
      },
      error: function(xhr) {
        const errorMsg = xhr.responseJSON?.error || "Error obteniendo tus trayectos.";
        $("#mensaje").html('<div class="alert alert-danger">' + errorMsg + '</div>');
      }
    });
  });
</script>

</body>
<div class="mb-4">
  <a href="menuEmpleado.html" class="btn btn-secondary">Volver al Menú</a>
</div>

</html>
