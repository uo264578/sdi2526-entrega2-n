<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Login AJAX</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
</head>
<body class="p-4 bg-light">

<h2 class="text-primary mb-4">Login</h2>

<div id="mensaje"></div>

<form id="form-login">
    <div class="mb-3">
        <label for="email" class="form-label">Email:</label>
        <input type="email" id="email" class="form-control" required>
    </div>

    <div class="mb-3">
        <label for="password" class="form-label">Contraseña:</label>
        <input type="password" id="password" class="form-control" required>
    </div>

    <button type="submit" class="btn btn-success">Iniciar Sesión</button>
</form>

<div id="zona-boton-menu" class="mt-4" style="display: none;">
    <button id="btn-ir-menu" class="btn btn-primary">Ir al Menú</button>
</div>

<script>
    $(document).ready(function() {
        $('#form-login').submit(function(event) {
            event.preventDefault();

            const email = $('#email').val().trim();
            const password = $('#password').val().trim();

            $.ajax({
                url: "/api/login",
                method: "POST",
                contentType: "application/json",
                data: JSON.stringify({ email: email, password: password }),
                success: function(response) {
                    localStorage.setItem('token', response.token);
                    $('#mensaje').html(`
                        <div class="alert alert-success">
                            Login exitoso.<br>
                            <strong>Token generado:</strong><br><small>${response.token}</small>
                        </div>
                    `);
                    $('#form-login').hide();
                    $('#zona-boton-menu').show();
                },
                error: function(xhr) {
                    const errorMsg = xhr.responseJSON?.error || "Error de inicio de sesión.";
                    $('#mensaje').html('<div class="alert alert-danger">' + errorMsg + '</div>');
                }
            });
        });

        $('#btn-ir-menu').click(function() {
            window.location.href = 'menuEmpleado.html';
        });
    });
</script>

</body>
</html>
