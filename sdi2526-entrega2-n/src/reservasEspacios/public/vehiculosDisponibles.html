<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Vehículos Disponibles</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <script src="https://code.jquery.com/jquery-3.7.0.min.js"></script>
</head>
<body class="bg-light">

<div class="container mt-5">
  <h2 class="text-primary text-center mb-4">Vehículos Disponibles</h2>
  <div id="mensaje" class="mb-4 text-center"></div>

  <table class="table table-striped" id="tablaVehiculos" style="display: none;">
    <thead class="table-primary">
    <tr>
      <th>Matrícula</th>
      <th>Marca</th>
      <th>Modelo</th>
      <th>Combustible</th>
    </tr>
    </thead>
    <tbody></tbody>
  </table>
</div>

<script>
  $(document).ready(function() {
    const token = localStorage.getItem('token');

    if (!token) {
      // No hay token → No puede ver vehículos
      alert('No tienes acceso. Por favor, inicia sesión.');
      window.location.href = 'client.html'; // O donde tengas tu login
      return;
    }

    // Si hay token, ahora sí hacemos la llamada AJAX
    $.ajax({
      url: "/api/vehiculos/disponibles",
      method: "GET",
      headers: {
        'Authorization': 'Bearer ' + token
      },
      success: function(vehiculos) {
        $("#mensaje").html('');
        if (vehiculos.length === 0) {
          $("#mensaje").html('<div class="alert alert-warning">No hay vehículos disponibles.</div>');
        } else {
          $("#tablaVehiculos tbody").empty();
          vehiculos.forEach(v => {
            $("#tablaVehiculos tbody").append(`
                        <tr>
                            <td>${v.matricula}</td>
                            <td>${v.marca}</td>
                            <td>${v.modelo}</td>
                            <td>${v.combustible}</td>
                        </tr>
                    `);
          });
          $("#tablaVehiculos").show();
        }
      },
      error: function(xhr) {
        $("#mensaje").html('<div class="alert alert-danger">Error cargando vehículos: ' + xhr.responseJSON.error + '</div>');
        if (xhr.status === 401 || xhr.status === 403) {
          localStorage.removeItem('token');
          alert('Tu sesión ha expirado. Por favor, inicia sesión de nuevo.');
          window.location.href = 'client.html';
        }
      }
    });
  });
</script>

</body>
<div class="mb-4">
  <a href="menuEmpleado.html" class="btn btn-secondary">Volver al Menú</a>
</div>

</html>
